<!DOCTYPE html>\n<html lang="en">\n<head>\n    <meta charset="UTF-8">\n    <meta name="viewport" content="width=device-width, initial-scale=1.0">\n    <title>Digital Clock</title>\n    <style>\n        body { font-family: Arial, sans-serif; text-align: center; margin-top: 50px; }\n        .clock { margin: 20px; font-size: 24px; }\n    </style>\n</head>\n<body>\n    <h1>Digital Clock</h1>\n    <div id="clocks"></div>\n    <script>\n        const timezones = {\n            "New York": "America/New_York",\n            "London": "Europe/London",\n            "Paris": "Europe/Paris",\n            "Dubai": "Asia/Dubai",\n            "Tokyo": "Asia/Tokyo",\n            "Sydney": "Australia/Sydney",\n            "Los Angeles": "America/Los_Angeles",\n            "Singapore": "Asia/Singapore",\n            "Toronto": "America/Toronto",\n            "Mumbai": "Asia/Kolkata",\n            "Berlin": "Europe/Berlin",\n            "Hong Kong": "Asia/Hong_Kong"\n        };\n        const clocksDiv = document.getElementById('clocks');\n        for (const [city, timezone] of Object.entries(timezones)) {\n            const clockDiv = document.createElement('div');\n            clockDiv.className = 'clock';\n            clockDiv.id = city;\n            clocksDiv.appendChild(clockDiv);\n            updateClock(city, timezone);\n        }\n        function updateClock(city, timezone) {\n            const now = new Date();\n            const utcTime = now.getTime() + (now.getTimezoneOffset() * 60000);\n            const localTime = new Date(utcTime + (3600000 * (Intl.DateTimeFormat().resolvedOptions().timeZone === timezone ? 0 : new Date().getTimezoneOffset() / 60)));\n            document.getElementById(city).innerText = city + ': ' + localTime.toLocaleString() + ' (' + timezone + ')';\n            setTimeout(() => updateClock(city, timezone), 1000);\n        }\n    <\/script>\n</body>\n</html>
